<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>home.fed - Federate Network</title>
<link rel="stylesheet" href="/style.css">
<script src="/fed-md.js" defer></script>
</head>
<body>
<main>
<header class="home-top">
  <select id="lang-select" class="lang-select" aria-label="Idioma / Language">
    <option value="pt" lang="pt-BR">Português</option>
    <option value="en" lang="en-US">English</option>
  </select>
</header>

<div class="site-mark">
  <img src="/logo.svg" alt="Federate Network" style="max-width:20rem;width:100%;height:auto">
  <h1 class="visually-hidden">Federate Network</h1>
</div>

<article class="md md-home" id="home-body" aria-live="polite">
  <noscript>
    <p lang="en-US">This page is written in markdown and rendered in your browser.
    JavaScript is off; read the source directly: <a href="/index.en.md">index.en.md</a>.</p>
    <p lang="pt-BR">Esta página é escrita em markdown e renderizada no navegador.
    Sem JavaScript, leia direto na fonte: <a href="/index.pt.md">index.pt.md</a>.</p>
  </noscript>
</article>

<footer>
  <span class="only-pt" lang="pt-BR">Servido pela Federate Network: endereçado por conteúdo, verificado por hash, humano.</span>
  <span class="only-en" lang="en-US">Served through the Federate Network: content-addressed, hash-verified, human.</span><br>
  domain → root zone → TLD → domain record → manifest → content blocks → your browser.
</footer>

<script>
(function () {
  function init() {
    var body = document.getElementById('home-body');
    var select = document.getElementById('lang-select');

    function apply(lang) {
      var isPt = lang === 'pt';
      select.value = lang;
      body.setAttribute('lang', isPt ? 'pt-BR' : 'en-US');
      document.documentElement.lang = isPt ? 'pt-BR' : 'en-US';
      window.fedMD.mount(body, isPt ? '/index.pt.md' : '/index.en.md');
      try { localStorage.setItem('federate-lang', lang); } catch (e) {}
    }

    select.addEventListener('change', function () { apply(select.value); });

    var saved = null;
    try { saved = localStorage.getItem('federate-lang'); } catch (e) {}
    if (saved !== 'pt' && saved !== 'en') {
      saved = (navigator.language || 'pt').toLowerCase().indexOf('pt') === 0 ? 'pt' : 'en';
    }
    apply(saved);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</main>
</body>
</html>

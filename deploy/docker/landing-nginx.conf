# federate.network landing page: static files only.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html                         html;
        text/css                          css;
        application/javascript            js;
        text/markdown                     md;
        image/svg+xml                     svg;
        font/woff2                        woff2;
        application/x-apple-aspen-config  mobileconfig;
        # installers must arrive as text: curl|bash and iex(irm ...) both
        # want a string body, not a binary attachment
        text/plain                        sh ps1;
        application/gzip                  gz;
        application/zip                   zip;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

# federate.network landing page: static files only.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html                         html;
        text/css                          css;
        application/javascript            js;
        text/markdown                     md;
        image/svg+xml                     svg;
        font/woff2                        woff2;
        application/x-apple-aspen-config  mobileconfig;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

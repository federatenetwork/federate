# Official Federate TLD seed file.
#
# This is DATA, not code: nothing here takes effect until an operator runs
#
#   federate root seed --file seeds/official-tlds.toml --data-dir <node data dir>
#
# The command validates every name (naming rules + blocked_tlds.txt +
# policy/brand-safety lists), creates root-signed TldRecords through the
# normal audited mutation path, persists them in the registry database, and
# signs a new root zone version. If the registry already holds TLDs the
# command refuses; --force only ADDS missing entries, never overwrites.
#
# Modes: "official" (root-managed, resolvable), "reserved", "blocked".

# Core namespaces
[[tlds]]
name = "fed"
mode = "official"
purpose = "Official Federate namespace: specs, protocol docs, registry, status, root info, governance, official tools."

[[tlds]]
name = "busca"
mode = "official"
purpose = "Federate search and discovery services (e.g. fed.busca). Official, root-managed."

